version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: livecode_backend_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: .7447_GEE
      POSTGRES_DB: livecode_db
    volumes:
      - pgdata_backend:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d livecode_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_network

  redis:
    image: redis:7-alpine
    container_name: livecode_backend_redis
    restart: unless-stopped
    volumes:
      - redisdata_backend:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livecode_backend_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:.7447_GEE@db/livecode_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data_backend:/app/var/uploads
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/courses/')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend_network

volumes:
  pgdata_backend:
    driver: local
  redisdata_backend:
    driver: local
  uploads_data_backend:
    driver: local

networks:
  backend_network:
    driver: bridge
